<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#1a3a6b"/>
  <!-- Body / hoodie -->
  <ellipse cx="50" cy="95" rx="32" ry="22" fill="#2d5ea8"/>
  <ellipse cx="50" cy="88" rx="26" ry="18" fill="#3a7bd5"/>
  <!-- Neck -->
  <rect x="42" y="68" width="16" height="14" rx="6" fill="#f5c5a0"/>
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="22" ry="24" fill="#f5c5a0"/>
  <!-- Hair -->
  <ellipse cx="50" cy="32" rx="22" ry="12" fill="#4a2c0a"/>
  <ellipse cx="32" cy="40" rx="8" ry="10" fill="#4a2c0a"/>
  <ellipse cx="68" cy="40" rx="8" ry="10" fill="#4a2c0a"/>
  <ellipse cx="50" cy="28" rx="20" ry="8" fill="#4a2c0a"/>
  <!-- Ears -->
  <ellipse cx="28" cy="52" rx="5" ry="7" fill="#f5c5a0"/>
  <ellipse cx="72" cy="52" rx="5" ry="7" fill="#f5c5a0"/>
  <!-- Eyes -->
  <ellipse cx="40" cy="50" rx="7" ry="6" fill="white"/>
  <ellipse cx="60" cy="50" rx="7" ry="6" fill="white"/>
  <circle cx="41" cy="51" r="4" fill="#2c5282"/>
  <circle cx="61" cy="51" r="4" fill="#2c5282"/>
  <circle cx="42" cy="50" r="1.5" fill="black"/>
  <circle cx="62" cy="50" r="1.5" fill="black"/>
  <!-- Glasses frame -->
  <rect x="32" y="45" width="16" height="12" rx="4" fill="none" stroke="#2d2d2d" stroke-width="2.2"/>
  <rect x="52" y="45" width="16" height="12" rx="4" fill="none" stroke="#2d2d2d" stroke-width="2.2"/>
  <line x1="48" y1="51" x2="52" y2="51" stroke="#2d2d2d" stroke-width="1.8"/>
  <line x1="28" y1="51" x2="32" y2="51" stroke="#2d2d2d" stroke-width="1.8"/>
  <line x1="68" y1="51" x2="72" y2="51" stroke="#2d2d2d" stroke-width="1.8"/>
  <!-- Smile -->
  <path d="M 43 62 Q 50 68 57 62" stroke="#c0825a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M 33 44 Q 40 41 47 44" stroke="#4a2c0a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 53 44 Q 60 41 67 44" stroke="#4a2c0a" stroke-width="2" fill="none" stroke-linecap="round"/>
